<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris 3D Mobile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <h1>Tetris 3D Mobile</h1>
    <p>Version mobile avec décor par niveau</p>

    <div class="game-box" id="gameBox">
      <div class="bg-layer" id="bgLayer"></div>
      <canvas id="gameCanvas" width="300" height="600"></canvas>
    </div>

    <div class="panel">
      <div>Score : <span id="score">0</span></div>
      <div>Niveau : <span id="level">1</span></div>
      <div>Lignes : <span id="lines">0</span></div>
    </div>

    <div class="controls">
      <button id="leftBtn">◀</button>
      <button id="rotateBtn">⟳</button>
      <button id="rightBtn">▶</button>
      <button id="downBtn">▼</button>
    </div>

    <div class="actions">
      <button id="startBtn">Jouer</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
